<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Money Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e8e5de;
      --text: #1a1a18;
      --muted: #8a8880;
      --accent: #2d6a4f;
      --accent-light: #e8f4ef;
      --danger: #c0392b;
      --danger-light: #fdecea;
      --income: #2d6a4f;
      --expense: #c0392b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* AUTH SCREEN */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .auth-card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    .auth-card p.subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--text);
      color: white;
      font-weight: 500;
    }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }

    .error-msg {
      background: var(--danger-light);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* APP SCREEN */
    #app-screen { display: none; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
    }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .username-badge {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
    }

    .btn-logout {
      padding: 0.4rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* SUMMARY CARDS */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      animation: fadeUp 0.4s ease both;
    }

    .summary-card:nth-child(2) { animation-delay: 0.05s; }
    .summary-card:nth-child(3) { animation-delay: 0.1s; }
    .summary-card:nth-child(4) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .card-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      line-height: 1;
    }

    .card-value.income { color: var(--income); }
    .card-value.expense { color: var(--expense); }
    .card-value.savings { color: var(--text); }

    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-weight: 300;
    }

    /* TWO COL LAYOUT */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    /* INSIGHTS */
    .insight-box {
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .insight-box.investment { background: var(--accent-light); }
    .insight-box.saving { background: #fff8e1; }
    .insight-box.warning { background: var(--danger-light); }

    .insight-type {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    .insight-type.investment { color: var(--accent); }
    .insight-type.saving { color: #b07d00; }
    .insight-type.warning { color: var(--danger); }

    .insight-desc {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
      font-weight: 300;
    }

    .insight-amount {
      margin-top: 0.6rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* CATEGORY BREAKDOWN */
    .cat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .cat-name { font-size: 0.88rem; }

    .cat-bar-wrap {
      flex: 1;
      margin: 0 0.75rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .cat-bar {
      height: 100%;
      background: var(--expense);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .cat-amount { font-size: 0.82rem; color: var(--muted); }

    /* TRANSACTIONS SECTION */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
    }

    .btn-add {
      padding: 0.5rem 1.25rem;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.8; }

    .transaction-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.3s ease both;
    }

    .tx-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .tx-category { font-weight: 500; font-size: 0.92rem; }
    .tx-meta { font-size: 0.78rem; color: var(--muted); font-weight: 300; }

    .tx-right { display: flex; align-items: center; gap: 1rem; }

    .tx-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
    }

    .tx-amount.income { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }

    .tx-actions { display: flex; gap: 0.4rem; }

    .btn-icon {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: all 0.15s;
    }

    .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
    .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .modal h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }

    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }

    .btn-cancel {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--muted);
    }

    .btn-save {
      flex: 2;
      padding: 0.75rem;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.85; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Money Tracker</h1>
    <p class="subtitle">Track your income, expenses & savings insights.</p>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <div id="auth-error" class="error-msg"></div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password"/>
      </div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Choose a password"/>
      </div>
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <h1>Money Tracker</h1>
    <div class="header-right">
      <span class="username-badge" id="header-username"></span>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- SUMMARY CARDS -->
    <div class="summary-grid" id="summary-grid">
      <div class="loading">Loading summary...</div>
    </div>

    <!-- INSIGHTS + CATEGORIES -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">Savings Insights</div>
        <div id="insights-container"><div class="loading">Loading insights...</div></div>
      </div>
      <div class="panel">
        <div class="panel-title">Spending by Category</div>
        <div id="categories-container"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="section-header">
      <span class="section-title">Transactions</span>
      <button class="btn-add" onclick="openModal()">+ Add Transaction</button>
    </div>
    <div class="transaction-list" id="transaction-list">
      <div class="loading">Loading transactions...</div>
    </div>
  </main>
</div>

<!-- TRANSACTION MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">New Transaction</h3>
    <input type="hidden" id="edit-id"/>
    <div class="form-group">
      <label>Type</label>
      <select id="tx-type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input type="text" id="tx-category" placeholder="e.g. Salary, Rent, Food"/>
    </div>
    <div class="form-group">
      <label>Amount (KES)</label>
      <input type="number" id="tx-amount" placeholder="0.00"/>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="tx-date"/>
    </div>
    <div class="form-group">
      <label>Note</label>
      <input type="text" id="tx-note" placeholder="Optional note"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000/api';
  let token = localStorage.getItem('access_token');
  let currentUser = localStorage.getItem('username');

  // --- AUTH ---
  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('auth-error').style.display = 'none';
  }

  async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return showError('Please fill in all fields.');
    try {
      const res = await fetch(`${API}/auth/login/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) return showError(data.detail || 'Invalid credentials.');
      token = data.access;
      currentUser = username;
      localStorage.setItem('access_token', token);
      localStorage.setItem('username', username);
      showApp();
    } catch { showError('Could not connect to server.'); }
  }

  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !email || !password) return showError('Please fill in all fields.');
    try {
      const res = await fetch(`${API}/auth/register/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showError(Object.values(data)[0] || 'Registration failed.');
      switchTab('login');
      document.getElementById('login-username').value = username;
      showError('Account created! Please sign in.');
      document.getElementById('auth-error').style.background = '#e8f4ef';
      document.getElementById('auth-error').style.color = '#2d6a4f';
    } catch { showError('Could not connect to server.'); }
  }

  function handleLogout() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('username');
    token = null; currentUser = null;
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('header-username').textContent = `Hi, ${currentUser}`;
    loadAll();
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  // --- LOAD ALL ---
  async function loadAll() {
    await Promise.all([loadSummary(), loadInsights(), loadTransactions()]);
  }

  // --- DASHBOARD SUMMARY ---
  async function loadSummary() {
    try {
      const res = await fetch(`${API}/dashboard/summary/`, { headers: authHeaders() });
      const d = await res.json();
      document.getElementById('summary-grid').innerHTML = `
        <div class="summary-card">
          <div class="card-label">Total Income</div>
          <div class="card-value income">KES ${fmt(d.total_income)}</div>
        </div>
        <div class="summary-card">
          <div class="card-label">Total Expenses</div>
          <div class="card-value expense">KES ${fmt(d.total_expenses)}</div>
        </div>
        <div class="summary-card">
          <div class="card-label">Net Savings</div>
          <div class="card-value savings">KES ${fmt(d.net_savings)}</div>
          <div class="card-sub">${d.savings_percentage?.toFixed(1)}% savings rate</div>
        </div>
      `;

      // Category breakdown
      const cats = d.category_breakdown || {};
      const total = d.total_expenses || 1;
      const catHTML = Object.keys(cats).length === 0
        ? '<div class="empty-state">No expenses yet.</div>'
        : Object.entries(cats).map(([name, amt]) => `
            <div class="cat-row">
              <span class="cat-name">${name}</span>
              <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.min((amt/total)*100,100)}%"></div></div>
              <span class="cat-amount">KES ${fmt(amt)}</span>
            </div>`).join('');
      document.getElementById('categories-container').innerHTML = catHTML;
    } catch { document.getElementById('summary-grid').innerHTML = '<div class="loading">Failed to load summary.</div>'; }
  }

  // --- INSIGHTS ---
  async function loadInsights() {
    try {
      const res = await fetch(`${API}/insights/`, { headers: authHeaders() });
      const d = await res.json();
      const typeClass = d.recommendation_type || 'saving';
      document.getElementById('insights-container').innerHTML = `
        <div class="insight-box ${typeClass}">
          <div class="insight-type ${typeClass}">${(d.recommendation_type || '').toUpperCase()}</div>
          <div class="insight-desc">${d.description}</div>
          ${d.suggested_amount ? `<div class="insight-amount">Suggested: KES ${fmt(d.suggested_amount)}</div>` : ''}
        </div>
        <div style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem;font-weight:300;">
          Based on your ${d.savings_percentage?.toFixed(1)}% savings rate
        </div>`;
    } catch { document.getElementById('insights-container').innerHTML = '<div class="empty-state">No insights yet.</div>'; }
  }

  // --- TRANSACTIONS ---
  async function loadTransactions() {
    try {
      const res = await fetch(`${API}/transactions/`, { headers: authHeaders() });
      const data = await res.json();
      if (!data.length) {
        document.getElementById('transaction-list').innerHTML = '<div class="empty-state">No transactions yet. Add one to get started.</div>';
        return;
      }
      document.getElementById('transaction-list').innerHTML = data.reverse().map(tx => `
        <div class="tx-item">
          <div class="tx-left">
            <span class="tx-category">${tx.category}</span>
            <span class="tx-meta">${tx.date}${tx.note ? ' · ' + tx.note : ''}</span>
          </div>
          <div class="tx-right">
            <span class="tx-amount ${tx.type}">${tx.type === 'income' ? '+' : '-'} KES ${fmt(tx.amount)}</span>
            <div class="tx-actions">
              <button class="btn-icon edit" onclick="editTransaction(${tx.id}, '${tx.type}', '${tx.category}', '${tx.amount}', '${tx.date}', '${tx.note || ''}')">✎</button>
              <button class="btn-icon" onclick="deleteTransaction(${tx.id})">✕</button>
            </div>
          </div>
        </div>`).join('');
    } catch { document.getElementById('transaction-list').innerHTML = '<div class="loading">Failed to load transactions.</div>'; }
  }

  // --- MODAL ---
  function openModal() {
    document.getElementById('modal-title').textContent = 'New Transaction';
    document.getElementById('edit-id').value = '';
    document.getElementById('tx-type').value = 'income';
    document.getElementById('tx-category').value = '';
    document.getElementById('tx-amount').value = '';
    document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('tx-note').value = '';
    document.getElementById('modal').classList.add('open');
  }

  function editTransaction(id, type, category, amount, date, note) {
    document.getElementById('modal-title').textContent = 'Edit Transaction';
    document.getElementById('edit-id').value = id;
    document.getElementById('tx-type').value = type;
    document.getElementById('tx-category').value = category;
    document.getElementById('tx-amount').value = amount;
    document.getElementById('tx-date').value = date;
    document.getElementById('tx-note').value = note;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  async function saveTransaction() {
    const id = document.getElementById('edit-id').value;
    const body = {
      type: document.getElementById('tx-type').value,
      category: document.getElementById('tx-category').value.trim(),
      amount: document.getElementById('tx-amount').value,
      date: document.getElementById('tx-date').value,
      note: document.getElementById('tx-note').value.trim()
    };
    if (!body.category || !body.amount || !body.date) return alert('Please fill in category, amount, and date.');
    const url = id ? `${API}/transactions/${id}/` : `${API}/transactions/`;
    const method = id ? 'PUT' : 'POST';
    try {
      const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      if (res.ok) { closeModal(); loadAll(); }
      else alert('Failed to save transaction.');
    } catch { alert('Could not connect to server.'); }
  }

  async function deleteTransaction(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
      await fetch(`${API}/transactions/${id}/`, { method: 'DELETE', headers: authHeaders() });
      loadAll();
    } catch { alert('Could not connect to server.'); }
  }

  // --- UTILS ---
  function fmt(n) { return Number(n).toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  // Auto-login if token exists
  if (token) showApp();
</script>
</body>
</html>
